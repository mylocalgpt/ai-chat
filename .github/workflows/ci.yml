name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Build frontend
        run: cd web && npm ci && npm run build
      - name: Lint Go
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
      - run: go vet ./...
      - run: go test ./...
      - name: Build binary
        run: go build ./cmd/ai-chat
